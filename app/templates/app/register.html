{% extends 'app/base.html' %}
{% block title %}Ro'yxatdan O'tish | Codefy{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-textPrimary mb-2">Profil Yarating</h1>
        <p class="text-textSecondary">Dasturlash sarguzashtingizni hoziroq boshlang</p>
    </div>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-bold text-textPrimary mb-1.5 uppercase tracking-wide">Foydalanuvchi nomi</label>
            <input type="text" name="username" class="w-full bg-bgPrimary border-2 border-borderLight rounded-2xl px-4 py-3.5 focus:outline-none focus:border-accentPurple focus:bg-white transition-colors font-semibold" required>
        </div>
        <div>
            <label class="block text-sm font-bold text-textPrimary mb-1.5 uppercase tracking-wide">Parol</label>
            <input type="password" name="password" class="w-full bg-bgPrimary border-2 border-borderLight rounded-2xl px-4 py-3.5 focus:outline-none focus:border-accentPurple focus:bg-white transition-colors font-semibold" required>
        </div>
        <div>
            <label class="block text-sm font-bold text-textPrimary mb-1.5 uppercase tracking-wide">Parolni takrorlang</label>
            <input type="password" name="confirm_password" class="w-full bg-bgPrimary border-2 border-borderLight rounded-2xl px-4 py-3.5 focus:outline-none focus:border-accentPurple focus:bg-white transition-colors font-semibold" required>
        </div>
        
        <button type="submit" class="btn-3d btn-purple w-full py-4 text-lg mt-6">
            Boshlash
        </button>
    </form>

    <div class="mt-8 text-center text-sm font-semibold text-textSecondary border-t-2 border-borderLight pt-6">
        Oldin ro'yxatdan o'tganmisiz? <a href="{% url 'login' %}" class="text-accentPurple hover:underline">Kirish</a>
    </div>
</div>
{% endblock %}
