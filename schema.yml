  /api/v1/lesson/{lesson_id}/:
    get:
      operationId: v1_lesson_retrieve
      parameters:
      - in: path
        name: lesson_id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/lesson/{lesson_id}/complete/:
    post:
      operationId: v1_lesson_complete_create
      parameters:
      - in: path
        name: lesson_id
        schema:
          type: integer
        required: true
      tags:
